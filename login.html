<main class="auth-main">
    <section class="auth-card">
        <h2>Login</h2>
        <p class="auth-note">Sign in to access tutors and messages.</p>

        <form id="loginForm" class="auth-form" method="POST" action="backend/login.php">
            
            <label for="username">Username:</label>
            <input type="text" id="username" name="username"><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>

            <p id="errorMsg"></p>

            <input type="submit" value="Login">
        </form>

        <p class="auth-link">Don't have an account? <a href="registration.html">Register here</a></p>
    </section>
</main>
